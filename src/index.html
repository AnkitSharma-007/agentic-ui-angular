<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Atlas: Agents that build their own UI</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Atlas: an agentic UI where Gemini's tool calls render interactive Angular components in real time. Bring your own key."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Plain stylesheet links (no inline onload swap) so the strict CSP shipped
         in the production index (src/index.prod.html) can forbid inline script.
         Icon font uses display=block, not swap: an unloaded icon font would
         otherwise flash its raw ligature words ("arrow_upward", "mic", …). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
